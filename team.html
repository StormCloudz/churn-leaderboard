<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Details</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Rajdhani', sans-serif;
    background: #050505;
    color: white;
    padding: 40px;
}

h1 {
    font-family: 'Orbitron';
    text-align: center;
}

.members {
    max-width: 600px;
    margin: 30px auto;
}

.member {
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.back {
    display: block;
    text-align: center;
    margin-top: 30px;
    color: #00f2ff;
}
</style>
</head>

<body>

<h1 id="teamName"></h1>

<div class="members" id="membersList"></div>

<a class="back" href="index.html">← Back to Leaderboard</a>

<script>
const params = new URLSearchParams(window.location.search);

const team = params.get("team");
const membersRaw = params.get("members");

document.getElementById("teamName").textContent = team;

/* 🔥 Clean parsing for messy data */
function parseMembers(text) {
    if (!text) return [];

    return text
        .replace(/\\n/g, "\n") // fix encoded newlines
        .split(/\n|,/)         // split by newline OR comma
        .map(m => m.trim())
        .filter(m => m.length > 0);
}

const members = parseMembers(decodeURIComponent(membersRaw));

const container = document.getElementById("membersList");

members.forEach(m => {
    const div = document.createElement("div");
    div.className = "member";
    div.textContent = m;
    container.appendChild(div);
});
</script>

</body>
</html>
